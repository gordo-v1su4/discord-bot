# Deploy the discord-bot stack to Hostinger on every push to main.
# Required GitHub repo secret: HOSTINGER_SSH_KEY
# Optional GitHub repo secret: HOSTINGER_APP_PATH (defaults to /root/discord-bot)
name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 187.77.8.227
          username: root
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            APP_PATH="${{ secrets.HOSTINGER_APP_PATH }}"
            [ -z "$APP_PATH" ] && APP_PATH="/root/discord-bot"
            if [ ! -d "$APP_PATH" ]; then
              echo "App path $APP_PATH not found. Clone the repo there first and add .env."
              exit 1
            fi

            cd "$APP_PATH"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            if [ ! -f .env ]; then
              echo "Missing $APP_PATH/.env on server."
              exit 1
            fi

            docker compose up -d --build
            docker compose ps
            docker image prune -f
