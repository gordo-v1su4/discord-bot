services:
  bot:
    image: discord-bot:latest
    build:
      context: .
    container_name: discord-bot
    env_file:
      - .env
    extra_hosts:
      - "convex-site.serving.cloud:172.18.0.1"
      - "convex.serving.cloud:172.18.0.1"
    restart: unless-stopped
  media-gateway:
    image: discord-bot:latest
    build:
      context: .
    container_name: pindeck-media-gateway
    env_file:
      - .env
    environment:
      PORT: 4545
      HEALTH_PORT: 4545
    command: ["bun", "src/media-gateway.js"]
    ports:
      - "4545:4545"
    restart: unless-stopped
