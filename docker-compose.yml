services:
  bot:
    image: discord-bot:latest
    build:
      context: .
    container_name: discord-bot
    env_file:
      - .env
    extra_hosts:
      - "convex-site.serving.cloud:172.18.0.1"
      - "convex.serving.cloud:172.18.0.1"
    restart: unless-stopped
  media-gateway:
    image: discord-bot:latest
    build:
      context: .
    container_name: pindeck-media-gateway
    env_file:
      - .env
    environment:
      PORT: 4545
      HEALTH_PORT: 4545
    command: ["bun", "src/media-gateway.js"]
    ports:
      - "4545:4545"
    restart: unless-stopped
  pinterest-ingest:
    image: pindeck-pinterest-ingest:latest
    build:
      context: ./services/pinterest-ingest
    container_name: pindeck-pinterest-ingest
    env_file:
      - .env
    environment:
      DATABASE_PATH: /data/pinterest-ingest.sqlite
      PINTEREST_COOKIES_PATH: /secrets/pinterest-cookies.txt
    volumes:
      - /docker/pinterest-ingest/data:/data
      - /docker/pinterest-ingest/secrets:/secrets:ro
    ports:
      - "127.0.0.1:8095:8080"
    labels:
      - traefik.enable=true
      - traefik.http.routers.pinterest-ingest.rule=Host(`rssbridge.serving.cloud`) && PathPrefix(`/pinterest-ingest`)
      - traefik.http.routers.pinterest-ingest.priority=100
      - traefik.http.routers.pinterest-ingest.entrypoints=websecure
      - traefik.http.routers.pinterest-ingest.tls.certresolver=letsencrypt
      - traefik.http.routers.pinterest-ingest.middlewares=pinterest-ingest-strip
      - traefik.http.routers.pinterest-ingest.service=pinterest-ingest
      - traefik.http.middlewares.pinterest-ingest-strip.stripprefix.prefixes=/pinterest-ingest
      - traefik.http.services.pinterest-ingest.loadbalancer.server.port=8080
    extra_hosts:
      - "convex-site.serving.cloud:172.18.0.1"
      - "convex.serving.cloud:172.18.0.1"
    restart: unless-stopped
